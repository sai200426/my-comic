<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KalyanComics</title>
<style>
body{margin:0;background:#0f172a;color:#fff;font-family:Arial,sans-serif}
header{padding:24px;text-align:center;background:linear-gradient(90deg,#6d28d9,#2563eb)}
h1{margin:0;font-size:42px}
#grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:24px;padding:24px}
.card{background:#1e293b;border-radius:14px;overflow:hidden;cursor:pointer;transition:.25s}
.card:hover{transform:translateY(-6px)}
canvas{width:100%;height:auto;background:#fff}
.title{padding:12px;text-align:center;font-size:20px}
#reader{display:none;height:100vh}
#toolbar{height:56px;background:#111827;display:flex;align-items:center;padding:0 16px}
button{padding:8px 16px;border:0;border-radius:8px;background:#2563eb;color:#fff;cursor:pointer}
iframe{width:100%;height:calc(100vh - 56px);border:none}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs" type="module"></script>
</head>
<body>
<div id="home">
<header><h1>KalyanComics</h1><p>Read AI Comics Free</p></header>
<div id="grid"></div>
</div>

<div id="reader">
<div id="toolbar"><button onclick="backHome()">⬅ Back</button></div>
<iframe id="pdfFrame"></iframe>
</div>

<script type="module">
import * as pdfjsLib from "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs";
pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs";

// ADD NEW COMICS HERE
const comics=[
 {title:"Shadow Man",file:"ShadowMan.pdf"},
 //{title:"Comic 2",file:"Comic2.pdf"},
];

const grid=document.getElementById("grid");

async function thumb(c){
 const card=document.createElement("div");
 card.className="card";
 const canvas=document.createElement("canvas");
 const t=document.createElement("div");
 t.className="title";
 t.textContent=c.title;
 card.append(canvas,t);
 card.onclick=()=>openComic(c.file);
 grid.append(card);

 const pdf=await pdfjsLib.getDocument(c.file).promise;
 const page=await pdf.getPage(1);
 const vp=page.getViewport({scale:0.5});
 canvas.width=vp.width;
 canvas.height=vp.height;
 await page.render({canvasContext:canvas.getContext("2d"),viewport:vp}).promise;
}

comics.forEach(c=>thumb(c));

window.openComic=function(file){
 document.getElementById("home").style.display="none";
 document.getElementById("reader").style.display="block";
 document.getElementById("pdfFrame").src=file;
}
window.backHome=function(){
 document.getElementById("reader").style.display="none";
 document.getElementById("home").style.display="block";
 document.getElementById("pdfFrame").src="";
}
</script>
</body>
</html>
