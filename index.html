<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KalyanComics</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#0d1117;
color:white;
}

header{
background:linear-gradient(90deg,#6a11cb,#2575fc);
padding:25px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,.5);
}

header h1{
font-size:42px;
letter-spacing:2px;
animation:glow 2s infinite alternate;
}

header p{
margin-top:10px;
color:#ddd;
}

@keyframes glow{
from{
text-shadow:0 0 10px cyan;
}
to{
text-shadow:0 0 25px white;
}
}

.container{
padding:30px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
}

.card{
background:#161b22;
width:260px;
border-radius:18px;
overflow:hidden;
transition:.3s;
cursor:pointer;
box-shadow:0 0 15px rgba(0,0,0,.4);
}

.card:hover{
transform:translateY(-10px) scale(1.03);
box-shadow:0 0 30px #2575fc;
}

.card img{
width:100%;
height:350px;
object-fit:cover;
}

.card h2{
padding:15px;
text-align:center;
}

.card button{
width:100%;
padding:15px;
border:none;
background:#2575fc;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
}

.card button:hover{
background:#6a11cb;
}

#reader{
display:none;
height:100vh;
background:black;
}

.topbar{
height:60px;
background:#161b22;
display:flex;
align-items:center;
padding-left:20px;
}

.back{
background:#2575fc;
padding:10px 20px;
border:none;
color:white;
font-size:16px;
cursor:pointer;
border-radius:8px;
}

.back:hover{
background:#6a11cb;
}

iframe{
width:100%;
height:calc(100vh - 60px);
border:none;
background:white;
}

footer{
text-align:center;
padding:25px;
color:#888;
}

</style>

</head>

<body>

<div id="home">

<header>

<h1>KalyanComics</h1>

<p>Adventure • Action • Mystery • Fantasy</p>

</header>

<div class="container">

<div class="card">

<img src="ShadowMan.jpg">

<h2>Shadow Man</h2>

<button onclick="openComic('ShadowMan.pdf')">

Read Comic

</button>

</div>

<!-- ADD MORE COMICS LIKE THIS

<div class="card">

<img src="comic2.jpg">

<h2>Comic 2</h2>

<button onclick="openComic('Comic2.pdf')">

Read Comic

</button>

</div>

-->

</div>

<footer>

© 2026 KalyanComics

</footer>

</div>

<div id="reader">

<div class="topbar">

<button class="back" onclick="goBack()">

⬅ Back

</button>

</div>

<iframe id="pdfViewer"></iframe>

</div>

<script>

function openComic(file){

document.getElementById("home").style.display="none";

document.getElementById("reader").style.display="block";

document.getElementById("pdfViewer").src=file;

window.scrollTo(0,0);

}

function goBack(){

document.getElementById("reader").style.display="none";

document.getElementById("home").style.display="block";

document.getElementById("pdfViewer").src="";

}

</script>

</body>
</html>
