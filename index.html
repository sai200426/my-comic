<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KalyanComics</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.5.136/pdf_viewer.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.5.136/pdf.min.js"></script>

<style>
body{margin:0;background:#0f172a;color:#fff;font-family:Arial}
header{padding:24px;text-align:center;background:linear-gradient(90deg,#6a11cb,#2575fc)}
h1{margin:0}
#home{padding:30px}
.card{width:250px;background:#1e293b;border-radius:14px;overflow:hidden;display:inline-block;margin:12px;cursor:pointer}
.card img{width:100%;height:330px;object-fit:cover}
.card h2{text-align:center}
.card button{width:100%;padding:12px;background:#2563eb;color:#fff;border:none}
#reader{display:none}
.top{background:#111827;padding:10px}
canvas{display:block;margin:16px auto;max-width:95%;height:auto;background:#fff}
</style>
</head>
<body>

<div id="home">
<header><h1>KalyanComics</h1></header>

<div class="card">
<img src="ShadowMan.jpg">
<h2>Shadow Man</h2>
<button onclick="openComic('ShadowMan.pdf')">Read Comic</button>
</div>

</div>

<div id="reader">
<div class="top">
<button onclick="backHome()">⬅ Back</button>
</div>
<div id="pages"></div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.5.136/pdf.worker.min.js';

async function openComic(file){
 document.getElementById('home').style.display='none';
 document.getElementById('reader').style.display='block';
 const container=document.getElementById('pages');
 container.innerHTML='';
 const pdf=await pdfjsLib.getDocument(file).promise;

 for(let i=1;i<=pdf.numPages;i++){
   const page=await pdf.getPage(i);
   const viewport=page.getViewport({scale:1.6});
   const canvas=document.createElement('canvas');
   const ctx=canvas.getContext('2d');
   canvas.width=viewport.width;
   canvas.height=viewport.height;
   await page.render({canvasContext:ctx,viewport}).promise;
   container.appendChild(canvas);
 }
 window.scrollTo(0,0);
}

function backHome(){
 document.getElementById('reader').style.display='none';
 document.getElementById('home').style.display='block';
 document.getElementById('pages').innerHTML='';
}
</script>

</body>
</html>
